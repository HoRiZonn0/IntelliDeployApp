name: Frontend CI/CD Preview

on:
  pull_request:
    branches:
      - "**"
    paths:
      - "frontend/**"
      - ".github/workflows/frontend-preview.yml"
  push:
    branches:
      - "**"
    paths:
      - "frontend/**"
      - ".github/workflows/frontend-preview.yml"

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: frontend-preview-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-deploy-preview:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build web output
        run: npx expo export --platform web

      - name: Deploy PR preview to gh-pages
        if: github.event_name == 'pull_request'
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          branch: gh-pages
          folder: frontend/dist
          target-folder: pr-preview/pr-${{ github.event.pull_request.number }}
          clean: false
          single-commit: true

      - name: Deploy branch preview to gh-pages
        if: github.event_name == 'push'
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          branch: gh-pages
          folder: frontend/dist
          target-folder: branch-preview/${{ github.ref_name }}
          clean: false
          single-commit: true

      - name: Build preview URL (PR)
        if: github.event_name == 'pull_request'
        run: |
          PREVIEW_URL="https://${{ github.repository_owner }}.github.io/${GITHUB_REPOSITORY#*/}/pr-preview/pr-${{ github.event.pull_request.number }}/"
          echo "PREVIEW_URL=$PREVIEW_URL" >> "$GITHUB_ENV"
          echo "Frontend preview: $PREVIEW_URL" >> "$GITHUB_STEP_SUMMARY"

      - name: Build preview URL (Push)
        if: github.event_name == 'push'
        run: |
          PREVIEW_URL="https://${{ github.repository_owner }}.github.io/${GITHUB_REPOSITORY#*/}/branch-preview/${GITHUB_REF_NAME}/"
          echo "PREVIEW_URL=$PREVIEW_URL" >> "$GITHUB_ENV"
          echo "Frontend preview: $PREVIEW_URL" >> "$GITHUB_STEP_SUMMARY"

      - name: Comment PR with preview URL
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const previewUrl = process.env.PREVIEW_URL;
            const marker = '<!-- frontend-preview-link -->';
            const body = `${marker}\n🚀 Frontend 预览地址：\n${previewUrl}`;
            const { owner, repo } = context.repo;
            const issue_number = context.payload.pull_request.number;
            const comments = await github.rest.issues.listComments({
              owner,
              repo,
              issue_number,
              per_page: 100,
            });
            const existing = comments.data.find(c => c.body && c.body.includes(marker));
            if (existing) {
              await github.rest.issues.updateComment({
                owner,
                repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number,
                body,
              });
            }
